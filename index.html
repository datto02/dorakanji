  <body>
    <div id="root"></div>
    <script>
      // Chặn chuột phải
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
      });

      // Chặn kéo thả
      document.addEventListener('dragstart', function(e) {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
        }
      });

      // Chặn copy
      document.addEventListener('copy', function(e) {
        const active = document.activeElement;
        if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) {
          return;
        }
        e.preventDefault();
      });

      // Chặn phím tắt
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12' || e.keyCode === 123) {
          e.preventDefault();
        }
        
        if (e.ctrlKey || e.metaKey) {
          if (e.key === 'u' || e.key === 'U' || e.keyCode === 85) {
            e.preventDefault(); // Ctrl + U
          }
          if (e.key === 's' || e.key === 'S' || e.keyCode === 83) {
            e.preventDefault(); // Ctrl + S
          }
          if (e.key === 'p' || e.key === 'P' || e.keyCode === 80) {
            // Cho phép in nếu muốn, nhưng yêu cầu chặn Ctrl+P.
            e.preventDefault(); // Ctrl + P
          }
          if (e.shiftKey) {
            if (e.key === 'i' || e.key === 'I' || e.keyCode === 73 || 
                e.key === 'c' || e.key === 'C' || e.keyCode === 67 || 
                e.key === 'j' || e.key === 'J' || e.keyCode === 74) {
              e.preventDefault(); // DevTools
            }
          }
        }
      });
    </script>
